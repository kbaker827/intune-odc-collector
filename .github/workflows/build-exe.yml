name: Build Windows Executable

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # required for gh release create

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build executable
      run: pyinstaller --clean IntuneODCCollector.spec

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: IntuneODCCollector-exe
        path: dist/IntuneODCCollector.exe

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        gh release create "${{ github.ref_name }}" dist/IntuneODCCollector.exe `
          --title "Release ${{ github.ref_name }}" `
          --generate-notes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
